  /v1/api/validate/order:
    post:
      tags:
        - Document Validation
      summary: Validate a UBL Order document
      description: |-
        Validate the structure and content of a UBL Order XML document by
        forwarding it to the configured external validation service. The
        response indicates whether the document is valid and lists any
        validation errors reported by the upstream validator.
      operationId: validateOrder
      requestBody:
        required: true
        description: Raw UBL Order XML document to validate.
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/OrderDoc'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'
        '400':
          description: Bad Request - the upstream validator rejected the request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '503':
          description: Service unavailable - upstream validator could not be reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/api/validate/despatch:
    post:
      tags:
        - Document Validation
      summary: Validate a UBL Despatch Advice document
      description: |-
        Validate the structure and content of a UBL Despatch Advice XML
        document by forwarding it to the configured external validation
        service. The response indicates whether the document is valid and
        lists any validation errors reported by the upstream validator.
      operationId: validateDespatch
