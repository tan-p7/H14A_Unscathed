openapi: 3.0.4
info:
  version: "1.0.0"
  title: Despatch Advice Processing API
  description: |-
    This is a SaaS cloud model API that can be used to process and manage Despatch Advice business documents. The service accepts UBL-standard Order and Despatch Advice documents to generate, retrieve, update, and delete Despatch Advice documents.
servers:
  - description: Despatch Advice Processing API Servers
    url: https://7ng4l9r5f2.execute-api.us-east-1.amazonaws.com/v2
tags:
  - name: User Authorisation
  - name: Despatch Handling v1
  - name: Despatch Handling v2
  - name: Document Validation
paths:
  /v1/api/despatch/health:
    get:
      tags:
        - Despatch Handling v1
      summary: Check the aliveness of the service
      description: Check whether the state of the server is operational.
      operationId: checkHealthV1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccess'
        '503':
          description: Service unavailable - underlying datastore not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
  /v1/api/despatch/despatch-advice:
    get:
      tags:
        - Despatch Handling v1
      summary: Retrieve all despatch advice documents
      description: Retrieve all despatch advice documents stored for the authenticated user.
      operationId: retrieveAllDespatchesV1
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DespatchDoc'
        '401':
          description: Unauthorized - missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: Forbidden - missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '503':
          description: Service unavailable - underlying datastore error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    post:
      tags:
        - Despatch Handling v1
      summary: Generate a despatch advice document
      description: Generate a despatch advice document using an order document and user-provided inputs.
      operationId: generateDespatchV1
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerationInput'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DespatchDoc'
        '400':
          description: Bad Request - Multiple possible causes (invalid XML, parse error, AWS persistence error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                MissingRequiredField:
                  value:
                    message: "Missing required field"
                InvalidElementType:
                  value:
                    message: "Invalid element type provided"
        '401':
          description: Unauthorized - missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: Forbidden - missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
  /v1/api/despatch/despatch-advice/{despatch-id}:
    get:
      tags:
        - Despatch Handling v1
      summary: Retrieve a despatch advice document
      description: Given a despatch advice ID, retrieve the corresponding despatch advice document stored in the database.
      operationId: retrieveDespatchByIdV1
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: despatch-id
          in: path
          required: true
          schema:
            type: string
            example: "565899000"
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DespatchDoc'
        '401':
          description: Unauthorized - missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: Forbidden - missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '404':
          description: Despatch advice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                DespatchAdviceNotFound:
                  value:
                    message: "Despatch advice 1 not found"
        '503':
          description: Service unavailable - underlying datastore error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    put:
      tags:
        - Despatch Handling v1
      summary: Update a despatch advice document
      description: Given a despatch advice ID, update the corresponding despatch advice document stored in the database.
      operationId: updateDespatchByIdV1
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: despatch-id
          in: path
          required: true
          schema:
            type: string
            example: "565899000"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFields'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/DespatchDoc'
        '400':
          description: Bad Request - invalid input (e.g. non-numeric quantity, malformed JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                InvalidElementType:
                  value:
                    message: "Delivered quantity must be a number."
                InvalidJsonBody:
                  value:
                    message: "Invalid JSON in request body"
        '401':
          description: Unauthorized - missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: Forbidden - missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '404':
          description: Despatch advice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                DespatchAdviceNotFound:
                  value:
                    message: "Despatch advice 1 not found"
        '500':
          description: Server error - stored despatch document is invalid XML
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
        '503':
          description: Service unavailable - underlying datastore error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
    delete:
      tags:
        - Despatch Handling v1
      summary: Delete a despatch advice document
      description: Given a despatch advice ID, delete the corresponding despatch advice document stored in the database.
      operationId: deleteDespatchByIdV1
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: despatch-id
          in: path
          required: true
          schema:
            type: string
            example: "565899000"
      responses:
        '204':
          description: Content deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessfulDeletion'
        '401':
          description: Unauthorized - missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '403':
          description: Forbidden - missing, invalid, or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '404':
          description: Despatch advice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                DespatchAdviceNotFound:
                  value:
                    message: "Despatch advice 1 not found"
        '503':
          description: Service unavailable - underlying datastore error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/api/auth/register:
    post:
      tags:
        - User Authorisation
      summary: Register a user
      description: Create a new user account. Stores a bcrypt password hash in DynamoDB.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/api/auth/login:
    post:
      tags:
        - User Authorisation
      summary: Login a user
      description: Authenticate a user and return an access token (JWT).
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/api/auth/logout:
    post:
      tags:
        - User Authorisation
      summary: Logout a user
      description: |-
        Logout the current session. Requires a Bearer token.
        If a revocations table is configured, the token jti is recorded until expiry.
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /v1/api/auth/create-api-key:
    post:
      tags:
        - User Authorisation
      summary: Create an API key
      description: |-
        Create a new API key for the authenticated user. Requires a Bearer
        token (JWT) - existing API keys cannot be used to mint new ones. The
        returned `api_key` can subsequently be supplied in the `X-API-Key`
        header to authenticate requests when JWT is not practical.
      operationId: createApiKey
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /v1/api/auth/google:
    post:
      tags:
        - User Authorisation
      summary: Sign in with Google
      description: |-
        Authenticate a user via a Google ID token. The token is verified against
        Google using the configured `GOOGLE_CLIENT_ID`. If the verified Google
        account's email is not yet registered, a new user record is created
        automatically (auto-registration on first Google login). On success, a
        JWT access token is returned in the same shape as the standard login
        endpoint.
      operationId: googleLoginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                InvalidJsonBody:
                  value:
                    message: "Invalid JSON body"
                MissingToken:
                  value:
                    message: "Token is required"
        '401':
          description: Invalid Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                InvalidGoogleToken:
                  value:
                    message: "Invalid Google token"
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

